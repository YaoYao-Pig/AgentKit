name: agentkit-ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e . pytest
      - name: Test
        run: python -m pytest
      - name: Enforced task run
        run: agentkit-run --workspace . --task examples/task.sample.yaml
      - name: Enforced verify
        run: agentkit-verify --workspace . --task-id sample-task-001
