skills:
  mock_action:
    purpose: default no-op action for starter flow
    risk_level: low
    adapter: mock

  run_shell_echo:
    purpose: run a shell command template
    risk_level: low
    adapter: shell
    command: "echo {message}"

  python_health_check:
    purpose: execute Python callable skill
    risk_level: low
    adapter: python_callable
    module: agentkit.runtime.sample_skills
    function: health_check

  run_tests:
    purpose: run project tests
    risk_level: low
    adapter: shell
    command: "python -m pytest -q"

  run_lint:
    purpose: run basic lint checks
    risk_level: low
    adapter: shell
    command: "python -m compileall src"
